<script>
(function() {
    function initRexTilt() {
        const persp  = document.getElementById('rex-persp');
        const tiltEl = document.getElementById('rex-tilt');
        const layer2 = document.getElementById('rex-layer-2');
        const layer3 = document.getElementById('rex-layer-3');
        const layer4 = document.getElementById('rex-layer-4');
        const layer5 = document.getElementById('rex-layer-5');
        if (!persp || !tiltEl) return;

        const maxTilt = 10;
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let raf = null;

        function apply() {
            currentX += (targetX - currentX) * 0.2;
            currentY += (targetY - currentY) * 0.2;

            tiltEl.style.transform =
                `rotateX(${currentY.toFixed(2)}deg) rotateY(${currentX.toFixed(2)}deg)`;

            // Normalized -1..1 tilt amount drives per-layer parallax offsets —
            // deeper layers (higher z-index, closer to the viewer) move more,
            // same idea as the Flutter TiltParallax reference (offsets of
            // 10 / 20 / 30 stacked on top of a static base layer).
            const nx = currentX / (maxTilt * 2);
            const ny = currentY / (maxTilt * 2);

            if (layer2) layer2.style.transform = `translate(${(nx * 22).toFixed(2)}px, ${(ny * 22).toFixed(2)}px)`;
            if (layer3) layer3.style.transform = `translate(${(nx * 44).toFixed(2)}px, ${(ny * 44).toFixed(2)}px)`;
            if (layer4) layer4.style.transform = `translate(${(nx * 72).toFixed(2)}px, ${(ny * 72).toFixed(2)}px)`;
            if (layer5) layer5.style.transform = `translate(${(nx * 108).toFixed(2)}px, ${(ny * 108).toFixed(2)}px)`;

            // Dynamic "shadow": on a pure-black page a real dark shadow is
            // invisible, so this is rendered as a light glow instead — same
            // idea as Flutter's ShadowProjectorConfig (shifts opposite the
            // tilt direction, grows in blur/intensity with tilt magnitude).
            const tiltMagnitude = Math.min(1, Math.sqrt(nx * nx + ny * ny));
            const shadowX = -nx * 46;
            const shadowY = 24 - ny * 46;
            const blur = 50 + tiltMagnitude * 70;
            const alpha = 0.25 + tiltMagnitude * 0.35;
            tiltEl.style.boxShadow =
                `${shadowX.toFixed(1)}px ${shadowY.toFixed(1)}px ${blur.toFixed(1)}px -6px rgba(189, 229, 242, ${alpha.toFixed(2)})`;

            const settled =
                Math.abs(targetX - currentX) < 0.02 &&
                Math.abs(targetY - currentY) < 0.02;

            raf = settled ? null : requestAnimationFrame(apply);
        }

        function start() {
            if (!raf) raf = requestAnimationFrame(apply);
        }

        persp.addEventListener('mousemove', (e) => {
            const rect = tiltEl.getBoundingClientRect();
            const px = (e.clientX - rect.left) / rect.width;
            const py = (e.clientY - rect.top) / rect.height;
            targetX = (px - 0.5) * maxTilt * 2;
            targetY = -(py - 0.5) * maxTilt * 2;
            start();
        });

        function handleTouch(e) {
            if (!e.touches || !e.touches.length) return;
            const touch = e.touches[0];
            const rect = tiltEl.getBoundingClientRect();
            const px = Math.min(1, Math.max(0, (touch.clientX - rect.left) / rect.width));
            const py = Math.min(1, Math.max(0, (touch.clientY - rect.top) / rect.height));
            targetX = (px - 0.5) * maxTilt * 2;
            targetY = -(py - 0.5) * maxTilt * 2;
            start();
        }

        persp.addEventListener('touchstart', (e) => {
            handleTouch(e);
        }, { passive: true });

        persp.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            handleTouch(e);
        }, { passive: false });

        persp.addEventListener('mouseleave', () => {
            targetX = 0;
            targetY = 0;
            start();
        });

        persp.addEventListener('touchend', () => {
            targetX = 0;
            targetY = 0;
            start();
        }, { passive: true });
    }
    window.addEventListener('load', initRexTilt);
    (function() {
        const frames = ['laputa.png', 'laputa_1.png', 'laputa_2.png', 'laputa_3.png'];
        let index = 0;
        const img = document.getElementById('laputa-img');
        if (!img) return;

        window.addEventListener('load', () => {
            frames.slice(1).forEach(src => { new Image().src = src; });
        });

        img.addEventListener('click', () => {
            index = (index + 1) % frames.length;
            img.src = frames[index];
        });
    })();
})();
</script>
